<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AES-CMAC Step-by-Step Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #111;
            max-width: 980px;
            margin: 0 auto;
            padding: 24px;
        }
        h1 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 18px;
        }
        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin: 10px 0 6px;
            font-weight: bold;
        }
        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            background: #fcfcfc;
        }
        textarea {
            min-height: 90px;
            resize: vertical;
        }
        .row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #4caf50;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover {
            background: #3e8f42;
        }
        .result {
            font-size: 18px;
            font-weight: bold;
            color: #1b5e20;
            text-align: center;
            margin-top: 14px;
            word-break: break-all;
        }
        .log {
            background: #f8f9fb;
            border: 1px solid #dfe3ea;
            border-radius: 6px;
            padding: 14px;
            font-family: "Courier New", monospace;
            font-size: 13px;
            white-space: pre-wrap;
            line-height: 1.45;
            max-height: 520px;
            overflow-y: auto;
        }
        .head {
            color: #0d47a1;
            font-weight: bold;
        }
        .err {
            color: #b71c1c;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>AES-CMAC Step-by-Step Visualizer</h1>

    <div class="card">
        <label for="keyHex">AES-128 Key (32 hex chars)</label>
        <input id="keyHex" type="text" value="2b7e151628aed2a6abf7158809cf4f3c" placeholder="Example: 2b7e151628aed2a6abf7158809cf4f3c">

        <label for="messageText">Message</label>
        <textarea id="messageText" placeholder="Enter message text">Hello CMAC</textarea>

        <div class="row">
            <button onclick="computeCMAC()">Compute CMAC</button>
            <button onclick="clearOutput()">Clear</button>
        </div>

        <div id="errorBox" class="err"></div>
        <div id="finalResult" class="result"></div>
    </div>

    <div class="card">
        <div id="outputLog" class="log">Steps will appear here...</div>
    </div>

    <script>
        const BLOCK_SIZE = 16;
        const RB = 0x87;
        let output = "";

        function logMsg(msg, isHead = false) {
            if (isHead) {
                output += "\n<span class=\"head\">" + msg + "</span>\n";
            } else {
                output += msg + "\n";
            }
        }

        function bytesToHex(bytes) {
            return Array.from(bytes)
                .map(b => b.toString(16).padStart(2, "0"))
                .join("");
        }

        function hexToBytes(hex) {
            const clean = hex.trim().toLowerCase();
            if (!/^[0-9a-f]+$/.test(clean) || clean.length % 2 !== 0) {
                throw new Error("Key must be valid hex.");
            }
            const out = new Uint8Array(clean.length / 2);
            for (let i = 0; i < out.length; i++) {
                out[i] = parseInt(clean.substr(i * 2, 2), 16);
            }
            return out;
        }

        function xorBlock(a, b) {
            const out = new Uint8Array(BLOCK_SIZE);
            for (let i = 0; i < BLOCK_SIZE; i++) {
                out[i] = a[i] ^ b[i];
            }
            return out;
        }

        function leftShiftOneBit(input) {
            const out = new Uint8Array(BLOCK_SIZE);
            let carry = 0;
            for (let i = BLOCK_SIZE - 1; i >= 0; i--) {
                const v = input[i];
                out[i] = ((v << 1) & 0xff) | carry;
                carry = (v & 0x80) ? 1 : 0;
            }
            return out;
        }

        function generateSubkey(k) {
            const msbSet = (k[0] & 0x80) !== 0;
            const shifted = leftShiftOneBit(k);
            if (msbSet) {
                shifted[BLOCK_SIZE - 1] ^= RB;
            }
            return shifted;
        }

        function padBlock(lastPartial) {
            const out = new Uint8Array(BLOCK_SIZE);
            out.set(lastPartial);
            out[lastPartial.length] = 0x80;
            return out;
        }

        function splitBlocks(bytes) {
            const blocks = [];
            for (let i = 0; i < bytes.length; i += BLOCK_SIZE) {
                blocks.push(bytes.slice(i, i + BLOCK_SIZE));
            }
            return blocks;
        }

        async function aesEncryptBlock(keyObj, block16) {
            const zeroIv = new Uint8Array(BLOCK_SIZE);
            const encrypted = await crypto.subtle.encrypt(
                { name: "AES-CBC", iv: zeroIv },
                keyObj,
                block16
            );
            return new Uint8Array(encrypted).slice(0, BLOCK_SIZE);
        }

        function clearOutput() {
            output = "";
            document.getElementById("outputLog").innerHTML = "Steps will appear here...";
            document.getElementById("finalResult").textContent = "";
            document.getElementById("errorBox").textContent = "";
        }

        async function computeCMAC() {
            const errorEl = document.getElementById("errorBox");
            const resultEl = document.getElementById("finalResult");
            const logEl = document.getElementById("outputLog");

            errorEl.textContent = "";
            resultEl.textContent = "";
            output = "";

            try {
                if (!window.crypto || !window.crypto.subtle) {
                    throw new Error("Web Crypto API is not available in this browser.");
                }

                const keyHex = document.getElementById("keyHex").value.trim();
                const message = document.getElementById("messageText").value;

                const keyBytes = hexToBytes(keyHex);
                if (keyBytes.length !== 16) {
                    throw new Error("AES-128 key must be exactly 16 bytes (32 hex chars).");
                }

                const msgBytes = new TextEncoder().encode(message);

                logMsg("Input", true);
                logMsg("Key (hex): " + keyHex.toLowerCase());
                logMsg("Message: \"" + message + "\"");
                logMsg("Message bytes (hex): " + bytesToHex(msgBytes));
                logMsg("Message length: " + msgBytes.length + " bytes");

                const keyObj = await crypto.subtle.importKey(
                    "raw",
                    keyBytes,
                    { name: "AES-CBC" },
                    false,
                    ["encrypt"]
                );

                logMsg("Step 1: Generate Subkeys", true);
                const L = await aesEncryptBlock(keyObj, new Uint8Array(BLOCK_SIZE));
                const K1 = generateSubkey(L);
                const K2 = generateSubkey(K1);
                logMsg("L  = AES-128(K, 0^128) = " + bytesToHex(L));
                logMsg("K1 = dbl(L)            = " + bytesToHex(K1));
                logMsg("K2 = dbl(K1)           = " + bytesToHex(K2));

                logMsg("Step 2: Prepare Message Blocks", true);
                const n = Math.max(1, Math.ceil(msgBytes.length / BLOCK_SIZE));
                const complete = msgBytes.length !== 0 && (msgBytes.length % BLOCK_SIZE === 0);
                const blocks = splitBlocks(msgBytes);

                if (msgBytes.length === 0) {
                    blocks.push(new Uint8Array(0));
                }

                for (let i = 0; i < n - 1; i++) {
                    logMsg("M" + (i + 1) + " = " + bytesToHex(blocks[i]));
                }

                let Mlast;
                if (complete) {
                    const last = blocks[n - 1];
                    Mlast = xorBlock(last, K1);
                    logMsg("Last block is complete.");
                    logMsg("M_last = M_n XOR K1 = " + bytesToHex(Mlast));
                } else {
                    const lastPartial = blocks[n - 1];
                    const padded = padBlock(lastPartial);
                    Mlast = xorBlock(padded, K2);
                    logMsg("Last block is not complete.");
                    logMsg("Padded last block = " + bytesToHex(padded));
                    logMsg("M_last = padded XOR K2 = " + bytesToHex(Mlast));
                }

                logMsg("Step 3: CBC-MAC Chaining", true);
                let X = new Uint8Array(BLOCK_SIZE);
                logMsg("X0 = " + bytesToHex(X));

                for (let i = 0; i < n - 1; i++) {
                    const Y = xorBlock(X, blocks[i]);
                    X = await aesEncryptBlock(keyObj, Y);
                    logMsg("Y" + (i + 1) + " = X" + i + " XOR M" + (i + 1) + " = " + bytesToHex(Y));
                    logMsg("X" + (i + 1) + " = AES-128(K, Y" + (i + 1) + ") = " + bytesToHex(X));
                }

                const Yfinal = xorBlock(X, Mlast);
                const T = await aesEncryptBlock(keyObj, Yfinal);
                logMsg("Y_final = X_(n-1) XOR M_last = " + bytesToHex(Yfinal));
                logMsg("T = AES-128(K, Y_final) = " + bytesToHex(T));

                logMsg("Step 4: Final CMAC", true);
                logMsg("CMAC Tag (128-bit): " + bytesToHex(T));

                logEl.innerHTML = output;
                resultEl.textContent = "Final CMAC Tag: " + bytesToHex(T);
            } catch (err) {
                errorEl.textContent = "Error: " + err.message;
                logEl.innerHTML = output || "No steps generated due to error.";
            }
        }

        window.onload = computeCMAC;
    </script>
</body>
</html>
