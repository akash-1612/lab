<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-256 Step-by-Step Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f3f3;
            color: #0b0b0b;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { color: #4CAF50; text-align: center; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            font-size: 16px;
            background-color: #fcf7f7;
            border: 1px solid #ebeaea;
            color: #d4d4d4;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #4CAF50; }
        .output-container {
            background-color: #efeff4;
            border: 1px solid #e9e5e5;
            border-radius: 4px;
            padding: 15px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            white-space: pre-wrap;
        }
        .step-header { color: #080808; font-weight: bold; margin-top: 15px; }
        .final-hash { color: #0c0c0c; font-weight: bold; font-size: 18px; text-align: center; margin-top: 20px; }
        .highlight { color: #0b0b0b; }
    </style>
</head>
<body>

    <h1>SHA-256 Algorithm Visualizer</h1>
    
    <div class="input-group">
        <input type="text" id="inputText" placeholder="Enter text to hash..." value="abc">
        <button onclick="computeSHA256()">Hash</button>
    </div>

    <div id="finalResult" class="final-hash"></div>
    <div id="outputLog" class="output-container">Steps will appear here...</div>

    <script>
        // SHA-256 Constants (First 32 bits of the fractional parts of the cube roots of the first 64 primes)
        const K = [
            0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
            0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
            0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
            0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
            0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
            0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
            0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
            0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
        ];

        // Initial Hash Values (First 32 bits of the fractional parts of the square roots of the first 8 primes)
        const H0_INIT = [0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19];

        // Bitwise operations
        const ROTR = (n, x) => (x >>> n) | (x << (32 - n));
        const Ch = (x, y, z) => (x & y) ^ (~x & z);
        const Maj = (x, y, z) => (x & y) ^ (x & z) ^ (y & z);
        const Sigma0 = (x) => ROTR(2, x) ^ ROTR(13, x) ^ ROTR(22, x);
        const Sigma1 = (x) => ROTR(6, x) ^ ROTR(11, x) ^ ROTR(25, x);
        const sigma0 = (x) => ROTR(7, x) ^ ROTR(18, x) ^ (x >>> 3);
        const sigma1 = (x) => ROTR(17, x) ^ ROTR(19, x) ^ (x >>> 10);

        const toHex32 = (n) => (n >>> 0).toString(16).padStart(8, '0');

        let output = "";
        function logMsg(msg, isHeader = false) {
            if (isHeader) output += `\n<span class="step-header">${msg}</span>\n`;
            else output += msg + "\n";
        }

        function computeSHA256() {
            output = "";
            const text = document.getElementById("inputText").value;
            const logEl = document.getElementById("outputLog");
            const resultEl = document.getElementById("finalResult");
            
            logMsg(`Input String: "${text}"`, true);

            // 1. Convert string to bytes (UTF-8)
            const encoder = new TextEncoder();
            const bytes = encoder.encode(text);
            const bitLength = bytes.length * 8;
            
            logMsg(`Step 1: Convert to Bytes`);
            logMsg(`Bytes: [${Array.from(bytes).map(b => '0x'+b.toString(16).padStart(2,'0')).join(', ')}]`);
            logMsg(`Original message length: ${bitLength} bits`);

            // 2. Padding
            logMsg(`Step 2: Padding`, true);
            logMsg(`- Append a '1' bit to the message.`);
            logMsg(`- Append '0' bits until length ≡ 448 (mod 512).`);
            logMsg(`- Append 64-bit original length.`);

            const bufferLength = ((bytes.length + 8) >> 6) + 1; // Number of 512-bit blocks (16 * 32-bit words)
            const M = new Uint32Array(bufferLength * 16);

            for (let i = 0; i < bytes.length; i++) {
                M[i >> 2] |= bytes[i] << (24 - (i % 4) * 8);
            }
            // Append 1 bit (0x80 byte)
            M[bytes.length >> 2] |= 0x80 << (24 - (bytes.length % 4) * 8);
            // Append length in bits as 64-bit big-endian
            M[M.length - 2] = Math.floor(bitLength / 0x100000000); // High 32 bits
            M[M.length - 1] = bitLength >>> 0;                     // Low 32 bits

            logMsg(`Padded message blocks (${bufferLength} block(s) of 512 bits):`);
            for(let i=0; i<M.length; i+=16) {
                logMsg(`Block ${i/16}: ` + Array.from(M.slice(i, i+16)).map(toHex32).join(' '));
            }

            // 3. Initialize working variables
            let H = [...H0_INIT];

            // 4. Process each 512-bit block
            logMsg(`Step 3: Process Blocks`, true);
            
            for (let i = 0; i < bufferLength; i++) {
                logMsg(`\n--- Processing Block ${i} ---`, true);
                const W = new Uint32Array(64);

                // Prepare message schedule (W)
                logMsg(`Message Schedule (W0 to W63):`);
                for (let t = 0; t < 16; t++) {
                    W[t] = M[i * 16 + t];
                }
                for (let t = 16; t < 64; t++) {
                    W[t] = (sigma1(W[t - 2]) + W[t - 7] + sigma0(W[t - 15]) + W[t - 16]) >>> 0;
                }
                logMsg(`W[0-15]:  ` + Array.from(W.slice(0, 16)).map(toHex32).join(' '));
                logMsg(`W[16-31]: ` + Array.from(W.slice(16, 32)).map(toHex32).join(' '));
                logMsg(`... (W32-W63 omitted for brevity) ...`);

                // Initialize working variables for this block
                let [a, b, c, d, e, f, g, h] = H;

                logMsg(`\nCompression Loop (64 rounds):`);
                logMsg(`Round |     a    |     b    |     c    |     d    |     e    |     f    |     g    |     h    `);
                logMsg(`-------------------------------------------------------------------------------------------------`);

                for (let t = 0; t < 64; t++) {
                    const T1 = (h + Sigma1(e) + Ch(e, f, g) + K[t] + W[t]) >>> 0;
                    const T2 = (Sigma0(a) + Maj(a, b, c)) >>> 0;

                    h = g;
                    g = f;
                    f = e;
                    e = (d + T1) >>> 0;
                    d = c;
                    c = b;
                    b = a;
                    a = (T1 + T2) >>> 0;

                    if (t < 4 || t > 59 || t === 31) {
                        logMsg(`  ${t.toString().padStart(2, '0')}  | ${toHex32(a)} | ${toHex32(b)} | ${toHex32(c)} | ${toHex32(d)} | ${toHex32(e)} | ${toHex32(f)} | ${toHex32(g)} | ${toHex32(h)}`);
                    }
                    if (t === 4) logMsg(` ...  |   ...    |   ...    |   ...    |   ...    |   ...    |   ...    |   ...    |   ...    `);
                }

                // Add compressed chunk to current hash value
                H[0] = (H[0] + a) >>> 0;
                H[1] = (H[1] + b) >>> 0;
                H[2] = (H[2] + c) >>> 0;
                H[3] = (H[3] + d) >>> 0;
                H[4] = (H[4] + e) >>> 0;
                H[5] = (H[5] + f) >>> 0;
                H[6] = (H[6] + g) >>> 0;
                H[7] = (H[7] + h) >>> 0;

                logMsg(`\nIntermediate Hash after Block ${i}:`);
                logMsg(H.map(toHex32).join(' '));
            }

            // 5. Final Hash
            const finalHash = H.map(toHex32).join('');
            logMsg(`Step 4: Final Output`, true);
            logMsg(`Concatenate H0 to H7 to get the final 256-bit hash.`);
            logMsg(`Final SHA-256 Hash: ${finalHash}`);
            logEl.innerHTML = output;
            resultEl.innerHTML = `Final SHA-256 Hash:<br><span class="highlight">${finalHash}</span>`;
        }
        
        // Run once on load
        window.onload = computeSHA256;
    </script>
</body>
</html>
